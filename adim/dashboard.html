<!doctype html>
<html lang="en" data-role="admin">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Dashboard - Tax Mozo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/dashboard.css">
  </head>
  <body>
    <div id="top-nav"></div>
    <main class="container py-5">
      <div class="row g-4">
        <div class="col-md-4">
          <div class="card p-4 stat-card">
            <h6 class="text-muted">Total Users</h6>
            <h2 id="totalUsers">0</h2>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card p-4 stat-card">
            <h6 class="text-muted">Total Revenue</h6>
            <h2 id="totalRevenue">INR 0</h2>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card p-4 stat-card">
            <h6 class="text-muted">Recent Purchases</h6>
            <ul id="recentPurchases" class="list-unstyled mb-0"></ul>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/app.js"></script>
    <script src="../assets/js/dashboard.js"></script>
  </body>
</html>
