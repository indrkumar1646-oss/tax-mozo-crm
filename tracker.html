<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Profile Tracker - Tax Mozo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
  </head>
  <body>
    <div id="top-nav"></div>
    <main class="container py-5">
      <div class="row">
        <div class="col-md-8">
          <div class="card p-4 mb-4">
            <h1>My Profile Tracker</h1>
            <p class="text-muted">Track your purchases with status steps and event timeline.</p>
            <div class="table-responsive mt-4">
              <table class="table table-borderless align-middle">
                <thead>
                  <tr>
                    <th>Purchase ID</th>
                    <th>Service</th>
                    <th>Amount</th>
                    <th>Status</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody id="trackerList"></tbody>
              </table>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card p-4" id="trackerDetail">
            <h5>Purchase Tracker</h5>
            <div id="timeline" class="mt-3"></div>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/app.js"></script>
  </body>
</html>
