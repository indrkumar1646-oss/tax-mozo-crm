<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard - Tax Mozo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dashboard.css">
  </head>
  <body>
    <div id="top-nav"></div>
    <main class="container py-5">
      <div class="card p-4">
        <h1 class="mb-3">My Dashboard</h1>
        <p class="text-muted">Filter and review your purchases by date range.</p>

        <div class="row g-3 my-4 align-items-center">
          <div class="col-md-3">
            <label class="form-label">From</label>
            <input type="date" class="form-control">
          </div>
          <div class="col-md-3">
            <label class="form-label">To</label>
            <input type="date" class="form-control">
          </div>
        </div>

        <div class="table-responsive">
          <table class="table table-borderless align-middle">
            <thead class="thead-light">
              <tr>
                <th>Purchase ID</th>
                <th>Service</th>
                <th>Amount</th>
                <th>Status</th>
                <th>Purchased At</th>
              </tr>
            </thead>
            <tbody id="dashboardPurchases"></tbody>
          </table>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/dashboard.js"></script>
  </body>
</html>
