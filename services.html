<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Services - Tax Mozo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
  </head>
  <body>
    <div id="top-nav"></div>
    <main class="container py-5">
      <div class="card p-4">
        <h1 class="mb-3">Service Catalog</h1>
        <p class="text-muted">Browse active services available to users.</p>

        <div class="row align-items-center mb-4">
          <div class="col-md-6 mb-2 mb-md-0">
            <label class="form-label">Filter by category</label>
            <select id="serviceCategoryFilter" class="form-select">
              <option value="all">All categories</option>
            </select>
          </div>
        </div>

        <div id="servicesList" class="row g-4"></div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/app.js"></script>
  </body>
</html>
